<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer teal circle -->
  <circle cx="100" cy="100" r="100" fill="#2A8A8A"/>
  <!-- Ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#5AACAC" stroke-width="3"/>
  <!-- Inner dark circle -->
  <circle cx="100" cy="100" r="60" fill="#1A6060"/>
  <!-- Fork (left) -->
  <g transform="translate(68,44)">
    <rect x="4" y="0" width="3" height="22" rx="1.5" fill="#E0F2F2"/>
    <rect x="10" y="0" width="3" height="22" rx="1.5" fill="#E0F2F2"/>
    <rect x="16" y="0" width="3" height="22" rx="1.5" fill="#E0F2F2"/>
    <rect x="5" y="22" width="13" height="3" rx="1.5" fill="#E0F2F2"/>
    <rect x="10" y="25" width="3" height="68" rx="1.5" fill="#E0F2F2"/>
  </g>
  <!-- Spoon (right) -->
  <g transform="translate(120,44)">
    <ellipse cx="11" cy="13" rx="9" ry="12" fill="#5AACAC"/>
    <ellipse cx="11" cy="12" rx="6" ry="8" fill="#2A8A8A"/>
    <rect x="9" y="24" width="4" height="68" rx="2" fill="#5AACAC"/>
  </g>
  <!-- Bold C -->
  <text x="100" y="116" text-anchor="middle" font-family="Georgia,serif" font-size="48" font-weight="bold" fill="#E0F2F2" letter-spacing="-1">C</text>
  <!-- CRONJES label -->
  <text x="100" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#A0D8D8" letter-spacing="4">CRONJES</text>
</svg>
