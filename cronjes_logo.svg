<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="100" fill="#1A4A4A"/>
  <!-- Inner plate circle -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#2A8A8A" stroke-width="3"/>
  <circle cx="100" cy="100" r="60" fill="#153A3A"/>
  <!-- Fork - left -->
  <g transform="translate(68,44)">
    <!-- tines -->
    <rect x="4" y="0" width="3" height="22" rx="1.5" fill="#E0F2F2"/>
    <rect x="10" y="0" width="3" height="22" rx="1.5" fill="#E0F2F2"/>
    <rect x="16" y="0" width="3" height="22" rx="1.5" fill="#E0F2F2"/>
    <!-- neck -->
    <rect x="5" y="22" width="13" height="3" rx="1.5" fill="#E0F2F2"/>
    <rect x="10" y="25" width="3" height="68" rx="1.5" fill="#E0F2F2"/>
  </g>
  <!-- Spoon - right -->
  <g transform="translate(120,44)">
    <!-- bowl -->
    <ellipse cx="11" cy="13" rx="9" ry="12" fill="#2A8A8A"/>
    <ellipse cx="11" cy="12" rx="6" ry="8" fill="#1A6060"/>
    <!-- handle -->
    <rect x="9" y="24" width="4" height="68" rx="2" fill="#2A8A8A"/>
  </g>
  <!-- C letter in centre -->
  <text x="100" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#E0F2F2" letter-spacing="-1">C</text>
  <!-- Bottom text arc approximation - just flat text -->
  <text x="100" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5AACAC" letter-spacing="4">CRONJES</text>
</svg>
